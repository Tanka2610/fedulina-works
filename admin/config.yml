<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Твоя страница</title>
  
  <!-- FAVICON -->
  <link rel="icon" type="image/png" sizes="32x32" href="/fedulina-works/images/favicon-fot100.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/fedulina-works/images/favicon-fot100.png">
  <link rel="icon" type="image/x-icon" href="/fedulina-works/favicon.ico">
  
  <!-- Остальные стили/скрипты -->
</head>
backend:
  name: github
  repo: Tanka2610/fedulina-works
  branch: main
  auth_type: token

# ✅ ВАЖНО: Эти два параметра должны быть ОДИНАКОВЫЕ
media_folder: "images/portfolio"
public_folder: "images/portfolio"

collections:
  - name: "albums"
    label: "Альбомы"
    folder: "data"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Название альбома", name: "title", widget: "string", required: true }
      - label: "Категория"
        name: "category"
        widget: "select"
        required: true
        options:
          - { label: "Свадебные", value: "wedding" }
          - { label: "Портретные", value: "portrait" }
          - { label: "Студийные", value: "studio" }
      - { label: "Обложка (thumb)", name: "cover", widget: "image", required: true }
      - label: "Фотографии"
        name: "photos"
        widget: "list"
        required: true
        fields:
          - { label: "Фото", name: "url", widget: "image", required: true }
