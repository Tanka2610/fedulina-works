<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Очистка неиспользуемых фото</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 1200px;
      margin: 50px auto;
      padding: 20px;
      background: #18181b;
      color: #e4e4e7;
    }
    h1 { color: #fbbf24; }
    .btn {
      background: #fbbf24;
      color: #18181b;
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      margin: 10px 5px;
    }
    .btn:hover { background: #f59e0b; }
    .btn-danger {
      background: #ef4444;
      color: white;
    }
    .btn-danger:hover { background: #dc2626; }
    .file-list {
      background: #27272a;
      padding: 20px;
      border-radius: 8px;
      margin-top: 20px;
    }
    .file-item {
      display: flex;
      align-items: center;
      padding: 10px;
      margin: 5px 0;
      background: #18181b;
      border-radius: 4px;
    }
    .file-item input { margin-right: 10px; }
    .file-item img {
      width: 50px;
      height: 50px;
      object-fit: cover;
      border-radius: 4px;
      margin-right: 10px;
    }
    .stats {
      background: #27272a;
      padding: 15px;
      border-radius: 8px;
      margin: 20px 0;
    }
    .loading { color: #fbbf24; font-size: 18px; }
  </style>
</head>
<body>
  <h1>🗑️ Очистка неиспользуемых фото</h1>
  
  <div class="stats" id="stats"></div>
  
  <button class="btn" onclick="scanFiles()">📊 Сканировать файлы</button>
  <button class="btn btn-danger" onclick="deleteSelected()" id="deleteBtn" style="display:none">
    🗑️ Удалить выбранные (<span id="count">0</span>)
  </button>
  
  <div class="file-list" id="fileList"></div>

  <script>
    let orphanedFiles = [];
    const REPO = 'Tanka2610/fedulina-works';
    const TOKEN = localStorage.getItem('github_token');

    async function scanFiles() {
      if (!TOKEN) {
        TOKEN = prompt('Введите GitHub токен:');
        if (TOKEN) localStorage.setItem('github_token', TOKEN);
      }

      document.getElementById('fileList').innerHTML = '<p class="loading">Сканирование...</p>';
      
      try {
        // 1. Получаем все альбомы из data/
        const albumsResponse = await fetch(`https://api.github.com/repos/${REPO}/contents/data`, {
          headers: { 'Authorization': `token ${TOKEN}` }
        });
        const albums = await albumsResponse.json();
        
        // 2. Собираем все используемые фото
        const usedPhotos = new Set();
        for (const album of albums.filter(f => f.name.endsWith('.md'))) {
          const content = await fetch(album.download_url).then(r => r.text());
          const matches = content.match(/images\/portfolio\/[^\s"')]+/g) || [];
          matches.forEach(url => usedPhotos.add(url.split('/').pop())); // сохраняем только имя файла
        }
        
        console.log('Используемые фото:', usedPhotos);

        // 3. Получаем все фото в папке
        const photosResponse = await fetch(`https://api.github.com/repos/${REPO}/contents/images/portfolio`, {
          headers: { 'Authorization': `token ${TOKEN}` }
        });
        const allPhotos = await photosResponse.json();
        
        // 4. Находим неиспользуемые
        orphanedFiles = allPhotos
          .filter(file => !usedPhotos.has(file.name))
          .filter(file => file.name !== 'favicon-fot100.png'); // исключаем favicon
        
        // 5. Показываем результат
        displayOrphans();
        
      } catch (error) {
        console.error('Ошибка:', error);
        document.getElementById('fileList').innerHTML = 
          `<p style="color:#ef4444">Ошибка: ${error.message}</p>`;
      }
    }

    function displayOrphans() {
      const stats = document.getElementById('stats');
      const fileList = document.getElementById('fileList');
      const deleteBtn = document.getElementById('deleteBtn');
      
      stats.innerHTML = `
        <strong>Найдено:</strong> ${orphanedFiles.length} неиспользуемых фото<br>
        <strong>Место:</strong> ~${(orphanedFiles.reduce((acc, f) => acc + (f.size || 0), 0) / 1024 / 1024).toFixed(2)} MB
      `;
      
      if (orphanedFiles.length === 0) {
        fileList.innerHTML = '<p>🎉 Все фото используются! Мусора нет.</p>';
        deleteBtn.style.display = 'none';
        return;
      }
      
      fileList.innerHTML = '<h3>Неиспользуемые фото:</h3>' + 
        orphanedFiles.map((file, index) => `
          <div class="file-item">
            <input type="checkbox" id="file-${index}" value="${file.path}" checked>
            <img src="${file.download_url}" alt="${file.name}" onerror="this.src='data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7'">
            <div>
              <strong>${file.name}</strong><br>
              <small>${(file.size / 1024).toFixed(1)} KB</small>
            </div>
          </div>
        `).join('');
      
      deleteBtn.style.display = 'inline-block';
      updateCount();
      
      // Обновляем счётчик при изменении чекбоксов
      document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
        cb.addEventListener('change', updateCount);
      });
    }

    function updateCount() {
      const count = document.querySelectorAll('input[type="checkbox"]:checked').length;
      document.getElementById('count').textContent = count;
    }

    async function deleteSelected() {
      const selected = Array.from(document.querySelectorAll('input[type="checkbox"]:checked'))
        .map(cb => cb.value);
      
      if (selected.length === 0) {
        alert('Выберите файлы для удаления');
        return;
      }
      
      if (!confirm(`Удалить ${selected.length} файлов? Это действие необратимо!`)) {
        return;
      }
      
      let deleted = 0;
      for (const path of selected) {
        try {
          // Получаем SHA файла для удаления
          const response = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
            headers: { 'Authorization': `token ${TOKEN}` }
          });
          const data = await response.json();
          
          // Удаляем файл
          await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
            method: 'DELETE',
            headers: { 
              'Authorization': `token ${TOKEN}`,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              message: `Delete unused file: ${path}`,
              sha: data.sha
            })
          });
          
          deleted++;
        } catch (error) {
          console.error(`Не удалось удалить ${path}:`, error);
        }
      }
      
      alert(`Удалено файлов: ${deleted}/${selected.length}`);
      scanFiles(); // Пересканировать
    }
  </script>
</body>
</html>
